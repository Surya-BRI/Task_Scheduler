name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

env:
  JWT_ACCESS_SECRET: ci-test-secret-min-16-chars
  CORS_ORIGIN: http://localhost:5000
  DATABASE_URL: sqlserver://localhost:1433;database=ci;user=sa;password=CiTest123!;encrypt=true;trustServerCertificate=true
  RUNTIME_SCHEMA_BOOTSTRAP: 'false'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace backend

      - name: Verify no tracked build artifacts
        run: npm run ci:verify

      - name: SQL injection guard (static scan + security tests)
        run: npm run security:check

      - name: Typecheck
        run: npm run typecheck

      - name: Backend unit tests
        run: npm run test --workspace backend

      - name: Backend integration tests
        run: npm run test:integration

      - name: Frontend tests
        run: npm run test --workspace frontend

      - name: Build backend
        run: npm run build --workspace backend

      - name: Build frontend
        run: npm run build --workspace frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: /api/v1
          API_PROXY_TARGET: http://localhost:7000

  docker:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: task-scheduler-api:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          tags: task-scheduler-web:ci
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=/api/v1
            API_PROXY_TARGET=http://backend:7000
